<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="auto">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="50%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#121212" />
    </linearGradient>

    <!-- Glowing Accents -->
    <linearGradient id="glowAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Node Gradient (Glass) -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.08)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.02)" />
    </linearGradient>

    <!-- Filters -->
    <filter id="neonGlow" filterUnits="userSpaceOnUse" x="-200" y="-200" width="1400" height="800">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="15" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glassShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="400" rx="24" fill="url(#bg)" />
  
  <!-- Subtle Grid Overlay -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <path d="M 0 50 L 1000 50 M 0 100 L 1000 100 M 0 150 L 1000 150 M 0 200 L 1000 200 M 0 250 L 1000 250 M 0 300 L 1000 300 M 0 350 L 1000 350" />
    <path d="M 100 0 L 100 400 M 200 0 L 200 400 M 300 0 L 300 400 M 400 0 L 400 400 M 500 0 L 500 400 M 600 0 L 600 400 M 700 0 L 700 400 M 800 0 L 800 400 M 900 0 L 900 400" />
  </g>

  <!-- Title / Branding -->
  <text x="50" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="1">NeuroLoom</text>
  <rect x="220" y="36" width="100" height="18" rx="9" fill="url(#glowAccent)" opacity="0.9"/>
  <text x="270" y="49" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">ARCHITECTURE</text>

  <!-- Connective Paths -->
  <!-- Main flow paths with glowing animation dots -->
  <path d="M 280 200 L 330 200" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="4,4" />
  <path d="M 630 200 L 680 200" fill="none" stroke="url(#glowAccent)" stroke-width="3" filter="url(#neonGlow)" />
  
  <circle cx="305" cy="200" r="3" fill="#ffffff" />
  <circle cx="655" cy="200" r="4" fill="#ffffff" filter="url(#neonGlow)" />

  <g font-family="system-ui, -apple-system, sans-serif">
    
    <!-- Stage 1: Runtime/Export -->
    <g transform="translate(60, 100)">
      <rect width="220" height="200" rx="20" fill="url(#glass)" stroke="rgba(255,255,255,0.1)" stroke-width="1" filter="url(#glassShadow)"/>
      <rect width="220" height="4" fill="url(#glowAccent)" opacity="0.6" style="mix-blend-mode: overlay;" />
      
      <!-- Python / PyTorch Capture Icon -->
      <circle cx="110" cy="80" r="40" fill="none" stroke="rgba(59,130,246,0.3)" stroke-width="2" />
      <path d="M90 70 Q 110 50 130 70 M 90 90 Q 110 110 130 90" fill="none" stroke="url(#glowAccent)" stroke-width="2.5" stroke-linecap="round" />
      <circle cx="110" cy="80" r="5" fill="#ec4899" filter="url(#neonGlow)"/>
      <circle cx="90" cy="70" r="3" fill="#3b82f6" filter="url(#neonGlow)"/>
      <circle cx="130" cy="90" r="3" fill="#8b5cf6" filter="url(#neonGlow)"/>
      
      <text x="110" y="145" text-anchor="middle" font-size="16" font-weight="600" fill="#f8fafc">Data &amp; Trace Capture</text>
      <text x="110" y="165" text-anchor="middle" font-size="11" fill="#94a3b8">PyTorch Hooks / Python</text>
      <text x="110" y="180" text-anchor="middle" font-size="11" fill="#94a3b8">official-traces (Live/Qwen)</text>
    </g>

    <!-- Stage 2: Loomtrace Engine / Runner -->
    <g transform="translate(330, 100)">
      <rect width="300" height="200" rx="20" fill="url(#glass)" stroke="rgba(255,255,255,0.15)" stroke-width="1" filter="url(#glassShadow)"/>
      
      <!-- Internal Nodes representing Runner & Core -->
      <g transform="translate(70, 60)">
        <circle cx="0" cy="-20" r="8" fill="#ec4899" filter="url(#neonGlow)"/>
        <circle cx="0" cy="20" r="8" fill="#ec4899" filter="url(#neonGlow)"/>
        <circle cx="80" cy="-20" r="8" fill="#8b5cf6" filter="url(#neonGlow)"/>
        <circle cx="80" cy="20" r="8" fill="#8b5cf6" filter="url(#neonGlow)"/>
        <circle cx="160" cy="0" r="8" fill="#3b82f6" filter="url(#neonGlow)"/>
        
        <path d="M 8 -20 L 72 -20 M 8 20 L 72 20 M 8 -20 L 72 20 M 8 20 L 72 -20" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
        <path d="M 88 -20 L 152 -3 L 88 20" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none" />
      </g>
      
      <text x="150" y="145" text-anchor="middle" font-size="16" font-weight="600" fill="#f8fafc">Runner Server &amp; Core</text>
      <text x="150" y="165" text-anchor="middle" font-size="11" fill="#94a3b8">Node.js SSE Proxy &amp; WebSocket Connect</text>
      <text x="150" y="180" text-anchor="middle" font-size="11" fill="#94a3b8">Zod Auth / .loomtrace Validations</text>
    </g>

    <!-- Stage 3: Studio / R3F -->
    <g transform="translate(680, 100)">
      <rect width="260" height="200" rx="20" fill="url(#glass)" stroke="url(#glowAccent)" stroke-width="1" filter="url(#glassShadow)"/>
      
      <!-- Minimal Perspective Grid / Camera representation -->
      <g transform="translate(130, 80) scale(1.1)">
        <!-- Center glowing core -->
        <circle cx="0" cy="0" r="16" fill="url(#glowAccent)" filter="url(#neonGlow)"/>
        <circle cx="0" cy="0" r="10" fill="#ffffff" opacity="0.9"/>
        
        <!-- Orbital ring -->
        <ellipse cx="0" cy="0" rx="45" ry="15" fill="none" stroke="#8b5cf6" stroke-width="1.5" transform="rotate(-15)"/>
        <ellipse cx="0" cy="0" rx="45" ry="15" fill="none" stroke="#3b82f6" stroke-width="1.5" transform="rotate(45)"/>
        
        <!-- Floating nodes along orbits -->
        <circle cx="43" cy="-12" r="4" fill="#3b82f6" filter="url(#neonGlow)"/>
        <circle cx="-32" cy="32" r="5" fill="#8b5cf6" filter="url(#neonGlow)"/>
        <circle cx="15" cy="-28" r="3" fill="#ec4899" filter="url(#neonGlow)"/>
        
        <!-- Outer hexagon representing a 3D isometric bounding box -->
        <polygon points="0,-40 34,-20 34,20 0,40 -34,20 -34,-20" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      </g>
      
      <text x="130" y="145" text-anchor="middle" font-size="16" font-weight="600" fill="#f8fafc">2.5D Cinematic Studio</text>
      <text x="130" y="165" text-anchor="middle" font-size="11" fill="#94a3b8">React 19 / R3F / 86k Neuron Field</text>
      <text x="130" y="180" text-anchor="middle" font-size="11" fill="#94a3b8">Live Rendering / Trace Replay</text>
    </g>
  </g>
  
  <!-- Additional Tech Badges -->
  <g transform="translate(680, 340)">
    <rect width="60" height="24" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="30" y="16" font-family="system-ui" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">React</text>
  </g>
  <g transform="translate(750, 340)">
    <rect width="70" height="24" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="35" y="16" font-family="system-ui" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">Three.js</text>
  </g>
  <g transform="translate(830, 340)">
    <rect width="80" height="24" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="40" y="16" font-family="system-ui" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">WebSocket</text>
  </g>
</svg>
